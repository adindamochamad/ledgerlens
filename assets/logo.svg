<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#14b8a6"/>
      <stop offset="1" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#e7f6f3"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="116" fill="url(#bg)"/>

  <!-- magnifier handle (drawn first so the lens overlaps its top) -->
  <line x1="356" y1="346" x2="438" y2="428" stroke="#ffffff" stroke-width="42" stroke-linecap="round"/>
  <line x1="356" y1="346" x2="438" y2="428" stroke="#0d9488" stroke-width="14" stroke-linecap="round" opacity="0.25"/>

  <!-- lens: subtle rim + glass -->
  <circle cx="286" cy="276" r="120" fill="#0f766e"/>
  <circle cx="286" cy="276" r="106" fill="url(#glass)"/>

  <!-- ledger lines inside the lens -->
  <rect x="222" y="226" width="128" height="18" rx="9" fill="#0d9488"/>
  <rect x="222" y="264" width="92"  height="18" rx="9" fill="#5eead4"/>

  <!-- reconciled checkmark -->
  <path d="M230 312 l24 24 l54 -58" fill="none" stroke="#059669"
        stroke-width="22" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
